<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Students</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<script>
if (!localStorage.getItem("loggedIn")) {
  window.location.href = "login.html";
}
</script>

<div id="sidebarContainer"></div>

<div class="main">

<h1>Students</h1>

<h2>Add Student</h2>

<form id="studentForm" enctype="multipart/form-data">

<input type="hidden" id="studentId">

<input type="text" id="name" placeholder="Student Name" required>

<input type="text" id="roll" placeholder="Roll Number" required>

<input type="email" id="email" placeholder="Email" required>

<input type="text" id="phone" placeholder="Phone" required>

<input type="text" id="course" placeholder="Course" required>

<input type="file" id="profile_pic" accept="image/*">

<button type="submit">Save Student</button>

</form>


<h2>Students List</h2>

<input type="text" id="search" placeholder="Search students...">

<button id="resetSearch">Reset</button>

<button id="deleteSelectedBtn">Delete Selected</button>

<br><br>

<input type="file" id="importFile">

<button id="importBtn">Import Excel</button>

<br><br>


<table>

<thead>

<tr>

<th><input type="checkbox" id="selectAll"></th>

<th>ID</th>

<th>Photo</th>

<th>Name</th>

<th>Roll</th>

<th>Email</th>

<th>Phone</th>

<th>Course</th>

<th>Action</th>

</tr>

</thead>

<tbody id="studentTableBody"></tbody>

</table>

<div id="pagination"></div>

</div>

<script src="js/main.js"></script>

<script>
fetch("sidebar.html")
.then(response => response.text())
.then(data => {
document.getElementById("sidebarContainer").innerHTML = data;
});
</script>

</body>
</html>
