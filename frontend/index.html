<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClassNova ERP Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>ClassNova</h2>
    <ul>
      <li>Dashboard</li>
      <li>Students</li>
      <li>Courses</li>
      <li>Teachers</li>
      <li>Settings</li>
      <li>Logout</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <h1>Student Management</h1>

    <!-- Stats Cards -->
    <div class="stats">
      <div class="card">
        <h3>Total Students</h3>
        <p id="totalStudents">0</p>
      </div>
    </div>

    <h2>Add / Update Student</h2>

    <form id="studentForm">
      <input type="hidden" id="studentId">
      <input type="text" id="name" placeholder="Student Name" required>
      <input type="text" id="roll" placeholder="Roll Number" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="phone" placeholder="Phone" required>
      <input type="text" id="course" placeholder="Course" required>
      <button type="submit">Save Student</button>
    </form>

    <h2>Students List</h2>

    <!-- Export & Bulk Delete Buttons -->
    <button id="exportExcelBtn" style="margin-bottom:10px;">Export to Excel</button>
    <button id="exportPdfBtn" style="margin-bottom:10px;">Export to PDF</button>
    <button id="deleteSelectedBtn" style="margin-bottom:10px; background:red; color:white;">Delete Selected</button>

    <input type="text" id="search" placeholder="Search student..." />

    <table>
      <thead>
        <tr>
          <th><input type="checkbox" id="selectAll"></th>
          <th>ID</th>
          <th>Name</th>
          <th>Roll</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Course</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>

    <!-- Pagination -->
    <div id="pagination"></div>

  </div>

</div>

<script src="js/main.js"></script>

<script>
  // Excel export
  document.getElementById("exportExcelBtn").addEventListener("click", () => {
    window.location.href = "http://localhost:3000/api/students/export";
  });

  // PDF export
  document.getElementById("exportPdfBtn").addEventListener("click", () => {
    window.location.href = "http://localhost:3000/api/students/export-pdf";
  });
</script>

</body>
</html>
